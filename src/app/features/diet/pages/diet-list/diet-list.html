<div class="p-6 h-full flex flex-col space-y-4 justify-center items-center">
  <div class="flex w-full justify-between items-center bg-white dark:bg-gray-900 px-6 py-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-800">
    <div>
      <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100 flex items-center gap-3">
        <i class="fa-solid fa-utensils text-emerald-500"></i>
        Dietas
      </h1>
      <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Visualiza y gestiona las dietas creadas por los usuarios</p>
    </div>
  </div>

  <div class="bg-white w-full dark:bg-gray-900 rounded-xl shadow-sm border border-gray-100 dark:border-gray-800 overflow-hidden flex-1 flex flex-col">
    <p-table 
      [value]="diets()" 
      [loading]="loading()"
      [paginator]="true" 
      [rows]="10" 
      selectionMode="single"
      [(selection)]="diets"
      [showCurrentPageReport]="true"
      [alwaysShowPaginator]="true"
      currentPageReportTemplate="Mostrando {first} al {last} de {totalRecords} dietas"
      class="flex-1 flex flex-col h-full min-h-0 w-full"
      styleClass="p-datatable-sm p-datatable-flex-bottom"
      responsiveLayout="scroll">
      
      <ng-template pTemplate="header">
        <tr>
          <th class="w-100">
            <div class="text-center">
              Nombre
            </div>
          </th>
          <th class="w-40">
            <div class="text-center">
              Usuario (ID)
            </div>
          </th>
          <th class=" w-32">
            <div class="text-center">
              Kcal Totales
            </div>
          </th>
          <th class=" w-32">
            <div class="text-center">
              Estado
            </div>
          </th>
          <th class="w-150">
            <div class="text-center">
              Notas
            </div>
          </th>
          <th class="w-32">
            <div class="text-center">
              Acciones
            </div>
          </th>
        </tr>
      </ng-template>
      
      <ng-template pTemplate="body" let-diet>
        <tr>
          <td class="font-medium text-gray-800 dark:text-gray-200">
            <div class="text-center">
              {{ diet.name }}
            </div>
          </td>
          <td>
            <div class="text-center">
              <span class="text-xs font-mono text-gray-500 bg-gray-100 dark:bg-gray-800 dark:text-gray-300 px-2 py-1 rounded-md">
                {{ diet.userId }}
              </span>
            </div>
          </td>
          <td >
            <div class="text-center">
              <span class="font-mono text-green-600 dark:text-green-400 font-bold">{{ diet.totalKcal }}</span>
              <span class="text-xs text-gray-400 ml-1">kcal</span>
            </div>
          </td>
          <td >
            <div class="text-center">
              <p-tag 
                [value]="diet.isActive ? 'Activa' : 'Inactiva'" 
                [severity]="diet.isActive ? 'success' : 'secondary'">
              </p-tag>
            </div>
          </td>
          <td>
            <div class="text-center">
              <span class="text-sm text-gray-500  block">{{ diet.notes || '—' }}</span>
            </div>
          </td>
          <td>
            <div class="flex justify-center gap-1">
              <p-button icon="fa-solid fa-trash" [rounded]="true" [text]="true" severity="danger" (onClick)="deleteDiet(diet)" pTooltip="Eliminar" tooltipPosition="left"></p-button>
            </div>
          </td>
        </tr>
      </ng-template>
      
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="text-center p-8 text-gray-500">
            <i class="fa-solid fa-salad text-4xl mb-4 text-gray-300 dark:text-gray-700 block"></i>
            No hay dietas registradas en la base de datos.
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-toast position="bottom-right"></p-toast>
<p-confirmDialog></p-confirmDialog>
