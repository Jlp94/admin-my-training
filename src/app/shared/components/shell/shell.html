<div class="h-screen flex flex-col bg-slate-700 dark:bg-gray-950 overflow-hidden">
  
  <header class="h-12 shrink-0 bg-blue-900  dark:bg-gray-900 border-b border-gray-900 dark:border-gray-700 text-gray-100 dark:text-gray-100 flex items-center justify-between px-4 sm:px-6 shadow-sm z-10 w-full relative">
    
    <div class="flex items-center gap-3 h-full cursor-pointer hover:opacity-80 transition-opacity" routerLink="/dashboard">
      <img src="/images/logo.png" alt="Logo" class="h-8 w-8 rounded-full object-cover" />
      <span class="font-bold text-xl tracking-wide hidden sm:block text-gray-100 dark:text-gray-0">MyTraining Admin</span>
    </div>

    <div class="flex items-center gap-4">
      <div class="hidden sm:flex items-center gap-2 bg-blue-800 dark:bg-gray-800 px-3 py-1.5 rounded-full border border-blue-700 dark:border-gray-700 shadow-sm transition-all hover:bg-blue-700">
        <i class="fa-solid fa-user-shield text-[10px] text-blue-200"></i>
        <span class="text-xs font-bold text-white tracking-wide truncate max-w-[150px]">
          {{ currentUser()?.getFullName() || 'Administrador' }}
        </span>
      </div>
      <p-button 
        icon="fa-solid fa-sign-out-alt" 
        [text]="true" 
        severity="danger"
        class="text-blue-100 hover:text-white"
        (onClick)="logout()"
        pTooltip="Cerrar sesión"
        tooltipPosition="bottom"
      />
    </div>
  </header>

  <div class="flex-1 flex overflow-hidden w-full relative bg-surface-100 dark:bg-surface-950">
    
    <aside 
      class="h-full bg-gray-1100 dark:bg-gray-900 border-r border-gray-200 dark:border-gray-700 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)] flex flex-col transition-all duration-200 ease-in-out z-20 relative"
      [class.w-16]="collapsed()" 
      [class.w-56]="!collapsed()"
    >
      
      <button 
        type="button"
        (click)="toggleSidebar()" 
        class="h-12 w-full flex items-center shrink-0 border-b border-surface-100 dark:border-surface-800 text-surface-500 hover:bg-surface-200 dark:hover:bg-surface-800 transition-colors focus:outline-none"
        [class.justify-center]="collapsed()"
        [class.justify-end]="!collapsed()"
        [class.pr-4]="!collapsed()"
        [pTooltip]="collapsed() ? 'Expandir menú' : 'Colapsar menú'"
        tooltipPosition="right"
      >
        <i class="fa-solid text-2xl transition-transform duration-200 text-blue-800 dark:text-blue-300" 
          [class.fa-angles-right]="collapsed()" 
          [class.fa-angles-left]="!collapsed()"></i>
      </button>

      <nav class="flex-1 overflow-y-auto py-2 flex flex-col gap-1">
        @for (item of navItems; track item.route) {
          <a 
            [routerLink]="item.route" 
            routerLinkActive="bg-blue-200 dark:bg-blue-800 text-blue-900 dark:text-blue-300 border-l-4 border-blue-700 dark:border-blue-400 font-semibold shadow-sm"
            [routerLinkActiveOptions]="{exact: item.exact || false}"
            class="h-14 flex items-center text-surface-600 dark:text-surface-300 hover:bg-orange-200 dark:hover:bg-orange-800 transition-all cursor-pointer whitespace-nowrap overflow-hidden border-l-4 border-transparent"
            [pTooltip]="collapsed() ? item.label : ''"
            tooltipPosition="right"
          >
            <div class="w-15 flex items-center justify-center shrink-0">
              <i [class]="item.icon + ' text-[1.65rem] flex items-center justify-center text-blue-800 dark:text-blue-300'"></i>
            </div>
            
            <span 
              class="transition-opacity duration-200 text-base"
              [class.opacity-0]="collapsed()"
              [class.hidden]="collapsed()"
            >
              {{ item.label }}
            </span>
          </a>
        }
      </nav>

    </aside>

    <main class="flex-1 overflow-y-auto bg-slate-200 dark:bg-slate-950 flex flex-col relative">
      <div class="flex-1 p-6 z-0 relative">
        <router-outlet></router-outlet>
      </div>
    </main>

  </div>

  <footer class="bg-blue-900 dark:bg-blue-900 border-t border-gray-200 dark:border-gray-700 py-3 shrink-0 z-10 relative">
    <div class="flex flex-col items-center justify-center gap-2 text-xs text-gray-100">
      <div class="flex gap-4 font-medium">
        <a class="hover:text-blue-600 transition-colors cursor-pointer">Soporte</a>
        <a class="hover:text-blue-600 transition-colors cursor-pointer">Términos</a>
      </div>
      <span>&copy; {{ currentYear }} MyTraining Admin. Todos los derechos reservados.</span>
    </div>
  </footer>

</div>
